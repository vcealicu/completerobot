# completerobot.ai — HTTP-only (pre-SSL)
# Will be replaced by golive.sh after certbot

server {
    listen 80;
    listen [::]:80;
    server_name completerobot.ai www.completerobot.ai;

    root /var/www/completerobot.ai/public;
    index index.html;

    server_tokens off;
    access_log off;
    error_log /var/log/nginx/completerobot.ai.error.log crit;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location ~ /\. { deny all; }

    error_page 404 /error/404.html;
}
